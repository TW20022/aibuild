name: Compile HPLIP for OpenWrt - SDK 1.5

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download and Setup SDK
        run: |
          # 请确保此处 URL 为你实际使用的 mt7621 SDK 下载地址
          wget https://downloads.immortalwrt.org/releases/23.05.3/targets/ramips/mt7621/immortalwrt-sdk-23.05.3-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xJf *.tar.xz
          mv *-sdk-* sdk

      - name: Update and Install Feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: HPLIP Surgery (SDK 1.5 - Dummy Library Strategy)
        run: |
          cd sdk
          
          # 1. 修改 Makefile 编译参数，强制关闭 ImageProcessor 和 Python
          MAKEFILE=$(find feeds/packages/utils/hplip -name "Makefile" | head -n 1)
          sed -i 's/--disable-hpcups-install/--enable-hpcups-install/g' "$MAKEFILE"
          sed -i 's/--enable-lite-build/--enable-lite-build --disable-imageProcessor-build --disable-scan-build --disable-python-build/g' "$MAKEFILE"
          sed -i 's/+python3-light//g' "$MAKEFILE"
          sed -i 's/+python3//g' "$MAKEFILE"

          # 2. 预处理：释放源码包
          make package/feeds/packages/hplip/prepare V=s

          # 3. 核心手术：伪造 MIPS 架构的影子库
          # 找到源码目录（如 build_dir/target-mipsel_24kc_musl/hplip-3.23.12）
          HPLIP_SRC_DIR=$(find build_dir/target-mipsel_24kc_musl/ -name "hplip-*" -type d | head -n 1)
          
          echo "void dummy_symbol() {}" > "$HPLIP_SRC_DIR/dummy.c"
          
          # 使用 SDK 内部的交叉编译器生成 .so 文件
          ./staging_dir/toolchain-mipsel_24kc_gcc-13.3.0_musl/bin/mipsel-openwrt-linux-musl-gcc \
            -shared -fPIC "$HPLIP_SRC_DIR/dummy.c" -o "$HPLIP_SRC_DIR/prnt/hpcups/libImageProcessor.so"
          
          echo "=> 影子库已生成 at: $HPLIP_SRC_DIR/prnt/hpcups/libImageProcessor.so"
          
          # 4. 彻底清理 Makefile 和 configure 中的链接残留
          find "$HPLIP_SRC_DIR" -type f \( -name "Makefile*" -o -name "configure*" \) -exec sed -i 's/-lImageProcessor//g' {} +

      - name: Configure and Compile
        run: |
          cd sdk
          # 选中必要依赖
          echo "CONFIG_PACKAGE_hplip-common=y" >> .config
          echo "CONFIG_PACKAGE_libusb-1.0=y" >> .config
          echo "CONFIG_PACKAGE_libcups=y" >> .config
          echo "CONFIG_PACKAGE_libjpeg-turbo=y" >> .config
          
          make defconfig
          # 执行最终编译
          make package/feeds/packages/hplip/compile V=s -j$(nproc)

      - name: Collect and Upload Artifacts
        run: |
          mkdir -p ./output
          # 收集所有生成的 .ipk 文件以便手动确认
          find sdk/bin/ -name "*.ipk" -exec cp {} ./output/ \;
          
      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: hplip-mt7621-sdk1.5
          path: ./output/*
